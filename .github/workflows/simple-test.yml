name: ArkVM Tests

on:
  pull_request:
    branches:
      - ohos
  push:
    branches:
      - ohos
  workflow_dispatch:

concurrency:
  group: arkvm-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --locked

  unit-tests-linux:
    name: Linux Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup arkvm
        id: setup-arkvm
        uses: harmony-contrib/arkts-vm@v2.0.0
        with:
          cache: true

      - name: Validate Ark host bundle
        env:
          ARK_HOST_TOOLS_DIR: ${{ steps.setup-arkvm.outputs.arkvm-path }}
        run: |
          set -euo pipefail
          echo "Expect host bundle at: ${ARK_HOST_TOOLS_DIR}"
          test -x "${ARK_HOST_TOOLS_DIR}/ark_js_napi_cli"
          test -x "${ARK_HOST_TOOLS_DIR}/es2abc"
          test -f "${ARK_HOST_TOOLS_DIR}/libace_napi.so"
          test -f "${ARK_HOST_TOOLS_DIR}/libets_interop_js_napi.so"

      - name: Run ArkTS + N-API Tests
        env:
          ARK_HOST_TOOLS_DIR: ${{ steps.setup-arkvm.outputs.arkvm-path }}
          ARKVM_USE_DOCKER: "0"
        run: bash ./scripts/ohos/run_split_tests_arkvm.sh
