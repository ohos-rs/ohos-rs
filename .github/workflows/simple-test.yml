name: Unit Tests

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      REQUIRE_ARK_HOST_TOOLS: "1"
      ARK_HOST_TOOLS_DIR: ${{ github.workspace }}/.ark-host/x64_linux_static
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate Ark host bundle
        run: |
          set -euo pipefail
          echo "Expect host bundle at: ${ARK_HOST_TOOLS_DIR}"
          test -x "${ARK_HOST_TOOLS_DIR}/ark_js_napi_cli"
          test -x "${ARK_HOST_TOOLS_DIR}/es2abc"
          test -f "${ARK_HOST_TOOLS_DIR}/libace_napi.so"

      - name: Run ArkTS + N-API Tests
        run: bash ./scripts/ci/run_ets_napi_host_tests.sh
